<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Minhas Férias</title>

<style>

body{
font-family:"Comic Sans MS",cursive;
margin:0;
overflow-x:hidden;
color:white;
text-align:center;
}

/* fundo principal */

#background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
background-size:cover;
background-position:center;
}

/* padrão repetido */

#bgPattern{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
opacity:0.35;
background-size:250px;
background-repeat:repeat;
}

/* fotos flutuando */

.fotoFlutuante{
position:fixed;
width:120px;
opacity:0.35;
z-index:-1;
pointer-events:none;
}

h1{
font-size:70px;
color:yellow;
text-shadow:3px 3px red;
}

#countdown{
font-size:35px;
background:black;
padding:10px;
display:inline-block;
margin:10px;
}

#videoContainer{
position:fixed;
top:20px;
right:20px;
}

video{
width:260px;
border:5px solid white;
}

#diario{
margin-top:30px;
background:rgba(0,0,0,0.7);
padding:20px;
}

textarea{
width:80%;
height:100px;
font-family:"Comic Sans MS";
font-size:18px;
}

button{
font-family:"Comic Sans MS";
font-size:20px;
padding:8px 20px;
margin-top:10px;
cursor:pointer;
}

#posts{
max-width:700px;
margin:auto;
margin-top:30px;
}

.post{
background:rgba(0,0,0,0.8);
padding:15px;
margin:10px;
border:3px dashed yellow;
text-align:left;
}

.data{
font-size:14px;
color:#ccc;
}

</style>
</head>

<body>

<div id="background"></div>
<div id="bgPattern"></div>

<h1>🌴 MINHAS FÉRIAS 🌴</h1>

<div id="countdown"></div>

<div id="videoContainer">
<video autoplay muted loop>
<source src="midia/video1.mp4" type="video/mp4">
</video>
</div>

<div id="diario">

<h2>Diário das férias</h2>

<textarea id="textoPost" placeholder="O que aconteceu hoje?"></textarea>

<br>

<button onclick="publicar()">PUBLICAR</button>

</div>

<div id="posts"></div>

<script>

/* LISTA DE FOTOS */

var fotos=[

"midia/foto1.jpg",
"midia/foto2.jpg",
"midia/foto3.jpg",
"midia/foto4.jpg",
"midia/foto5.jpg",
"midia/foto6.jpg",
"midia/foto7.jpg",
"midia/foto8.jpg",
"midia/foto9.jpg",
"midia/foto10.jpg",
"midia/foto11.jpg",
"midia/foto12.jpg",
"midia/foto13.jpg",
"midia/foto14.jpg",
"midia/foto15.jpg",
"midia/foto16.jpg",
"midia/foto17.jpg",
"midia/foto18.jpg",
"midia/foto19.jpg",
"midia/foto20.jpg",
"midia/foto21.jpg",
"midia/foto22.jpg",
"midia/foto23.jpg",
"midia/foto24.jpg",
"midia/foto25.jpg",
"midia/foto26.jpg",
"midia/foto27.jpg",
"midia/foto28.jpg",
"midia/foto29.jpg",
"midia/foto30.jpg"

]

/* FUNDO QUE MUDA */

function trocarFundo(){

var img=fotos[Math.floor(Math.random()*fotos.length)]

document.getElementById("background").style.backgroundImage="url("+img+")"
document.getElementById("bgPattern").style.backgroundImage="url("+img+")"

}

trocarFundo()

setInterval(trocarFundo,5000)


/* FOTOS PINGANDO */

function criarFotoFlutuante(){

var img=document.createElement("img")

img.src=fotos[Math.floor(Math.random()*fotos.length)]

img.className="fotoFlutuante"

var x=Math.random()*window.innerWidth
var y=Math.random()*window.innerHeight

img.style.left=x+"px"
img.style.top=y+"px"

document.body.appendChild(img)

var dx=(Math.random()*2)+1
var dy=(Math.random()*2)+1

setInterval(function(){

x+=dx
y+=dy

if(x>window.innerWidth-120||x<0) dx*=-1
if(y>window.innerHeight-120||y<0) dy*=-1

img.style.left=x+"px"
img.style.top=y+"px"

},30)

}

for(let i=0;i<25;i++){
criarFotoFlutuante()
}


/* COUNTDOWN */

var volta=new Date("2026-03-29T09:00:00")

function atualizar(){

var agora=new Date()

var diff=volta-agora

var dias=Math.floor(diff/(1000*60*60*24))
var horas=Math.floor((diff/(1000*60*60))%24)
var min=Math.floor((diff/(1000*60))%60)
var seg=Math.floor((diff/1000)%60)

document.getElementById("countdown").innerHTML=
"⏳ VOLTA AO TRABALHO EM: "+dias+"d "+horas+"h "+min+"m "+seg+"s"

}

setInterval(atualizar,1000)


/* MUSICA */

var audio=new Audio("musica/musica1.mp3")

audio.loop=true
audio.volume=0.7

function iniciarMusica(){

audio.play()

document.removeEventListener("mousemove",iniciarMusica)
document.removeEventListener("click",iniciarMusica)

}

document.addEventListener("mousemove",iniciarMusica)
document.addEventListener("click",iniciarMusica)


/* DIARIO */

function carregarPosts(){

var posts=JSON.parse(localStorage.getItem("postsFerias")||"[]")

var container=document.getElementById("posts")

container.innerHTML=""

posts.reverse().forEach(function(p){

var div=document.createElement("div")
div.className="post"

div.innerHTML=
"<div class='data'>"+p.data+"</div>"+p.texto

container.appendChild(div)

})

}

function publicar(){

var texto=document.getElementById("textoPost").value

if(texto=="") return

var posts=JSON.parse(localStorage.getItem("postsFerias")||"[]")

var agora=new Date()

var data=agora.toLocaleDateString()+" "+agora.toLocaleTimeString()

posts.push({
texto:texto,
data:data
})

localStorage.setItem("postsFerias",JSON.stringify(posts))

document.getElementById("textoPost").value=""

carregarPosts()

}

carregarPosts()

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Minhas Férias</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:70px;
margin-top:20px;
}

#countdown{
font-size:30px;
margin-bottom:20px;
}

#beer{
font-size:25px;
margin:20px;
}

.media{
position:absolute;
width:140px;
pointer-events:none;
}

.diario{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:20px;
max-height:40vh;
overflow:auto;
}

.dia{
background:#222;
padding:10px;
margin:10px;
border-radius:8px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🌴 MINHAS FÉRIAS 🌴</h1>

<div id="countdown"></div>

<div id="beer">
🍺 Cervejas consumidas: <span id="beerCount">0</span>
<br><br>
<button onclick="beer()">+1 cerveja</button>
</div>

<!-- mídias -->

<img src="midia/foto1.png" class="media">
<img src="midia/foto2.png" class="media">

<video class="media" autoplay muted loop>
<source src="midia/video1.mp4">
</video>

<video class="media" autoplay muted loop>
<source src="midia/video2.mp4">
</video>

<div class="diario">

<h2>📖 Diário das férias</h2>

<div class="dia">
<b>Dia 1</b><br>
Cheguei no destino e já abri uma cerveja.
</div>

<div class="dia">
<b>Dia 2</b><br>
Acordei 13h. Dia produtivo.
</div>

<div class="dia">
<b>Dia 3</b><br>
Ainda não sei que dia é hoje.
</div>

</div>

<script>

var volta = new Date("2026-03-20")

function atualizarCountdown(){

var agora = new Date()

var diff = volta - agora

var dias = Math.floor(diff/(1000*60*60*24))
var horas = Math.floor((diff/(1000*60*60))%24)
var min = Math.floor((diff/(1000*60))%60)

document.getElementById("countdown").innerHTML =
"⏳ Volta ao trabalho em: "+dias+"d "+horas+"h "+min+"m"

}

setInterval(atualizarCountdown,1000)



// contador de cerveja

var cervejas=0

function beer(){
cervejas++
document.getElementById("beerCount").innerText=cervejas
}



// movimento das imagens

var items=document.querySelectorAll(".media")

items.forEach(function(el){

var x=Math.random()*window.innerWidth
var y=Math.random()*window.innerHeight

var dx=(Math.random()*2)+1
var dy=(Math.random()*2)+1

setInterval(function(){

x+=dx
y+=dy

if(x>window.innerWidth-150 || x<0) dx*=-1
if(y>window.innerHeight-150 || y<0) dy*=-1

el.style.left=x+"px"
el.style.top=y+"px"

},30)

})

</script>

</body>
</html>

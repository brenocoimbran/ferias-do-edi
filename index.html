<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Minhas Férias</title>

<style>

body{
font-family:"Comic Sans MS",cursive;
text-align:center;
overflow:hidden;
color:white;

background-image:
url("midia/foto1.jpg"),
url("midia/foto2.jpg"),
url("midia/foto3.jpg"),
url("midia/foto4.jpg");

background-size:300px;
background-repeat:repeat;
}

h1{
font-size:80px;
color:yellow;
text-shadow:3px 3px red;
}

#countdown{
font-size:40px;
background:black;
display:inline-block;
padding:10px;
margin:20px;
}

.media{
position:absolute;
width:180px;
}

video{
width:240px;
}

#diario{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.8);
padding:10px;
}

textarea{
width:80%;
height:120px;
font-family:"Comic Sans MS";
font-size:18px;
}

</style>

</head>

<body>

<h1>🌴 MINHAS FÉRIAS 🌴</h1>

<div id="countdown"></div>

<div id="diario">
<h2>Diário das férias</h2>
<textarea placeholder="Escreva o que aconteceu hoje..."></textarea>
</div>

<script>

var imagens=[

"midia/foto1.jpg",
"midia/foto2.jpg",
"midia/foto3.jpg",
"midia/foto4.jpg",
"midia/foto5.jpg",
"midia/foto6.jpg",
"midia/foto7.jpg",
"midia/foto8.jpg",
"midia/foto9.jpg",
"midia/foto10.jpg",
"midia/foto11.jpg",
"midia/foto12.jpg",
"midia/foto13.jpg",
"midia/foto14.jpg",
"midia/foto15.jpg",
"midia/foto16.jpg",
"midia/foto17.jpg",
"midia/foto18.jpg",
"midia/foto19.jpg",
"midia/foto20.jpg",
"midia/foto21.jpg",
"midia/foto22.jpg",
"midia/foto23.jpg",
"midia/foto24.jpg",
"midia/foto25.jpg",
"midia/foto26.jpg",
"midia/foto27.jpg",
"midia/foto28.jpg",
"midia/foto29.jpg",
"midia/foto30.jpg"

]

var videos=[
"midia/video1.mp4"
]

function criarImagem(){

var img=document.createElement("img")

img.src=imagens[Math.floor(Math.random()*imagens.length)]

img.className="media"

var x=Math.random()*window.innerWidth
var y=Math.random()*window.innerHeight

img.style.left=x+"px"
img.style.top=y+"px"

document.body.appendChild(img)

movimento(img)

}

function criarVideo(){

var v=document.createElement("video")

v.src=videos[0]
v.autoplay=true
v.loop=true
v.muted=true

v.className="media"

var x=Math.random()*window.innerWidth
var y=Math.random()*window.innerHeight

v.style.left=x+"px"
v.style.top=y+"px"

document.body.appendChild(v)

movimento(v)

}

function movimento(el){

var x=parseFloat(el.style.left)
var y=parseFloat(el.style.top)

var dx=(Math.random()*3)+1
var dy=(Math.random()*3)+1

setInterval(function(){

x+=dx
y+=dy

if(x>window.innerWidth-200||x<0) dx*=-1
if(y>window.innerHeight-200||y<0) dy*=-1

el.style.left=x+"px"
el.style.top=y+"px"

},30)

}

for(let i=0;i<35;i++) criarImagem()

for(let i=0;i<3;i++) criarVideo()

var volta=new Date("2026-03-29T09:00:00")

function atualizar(){

var agora=new Date()

var diff=volta-agora

var dias=Math.floor(diff/(1000*60*60*24))
var horas=Math.floor((diff/(1000*60*60))%24)
var min=Math.floor((diff/(1000*60))%60)
var seg=Math.floor((diff/1000)%60)

document.getElementById("countdown").innerHTML=

"⏳ VOLTA AO TRABALHO EM: "+dias+"d "+horas+"h "+min+"m "+seg+"s"

}

setInterval(atualizar,1000)

</script>

</body>

</html>

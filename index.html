<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Minhas Férias</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:70px;
margin-top:20px;
}

#countdown{
font-size:35px;
margin-bottom:20px;
}

.media{
position:absolute;
width:180px;
border-radius:10px;
}

video{
width:220px;
}

#diario{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:15px;
}

textarea{
width:80%;
height:120px;
font-size:16px;
}

</style>

</head>

<body>

<h1>🌴 MINHAS FÉRIAS 🌴</h1>

<div id="countdown"></div>

<div id="diario">

<h2>Diário das férias</h2>

<textarea placeholder="Escreva o que aconteceu hoje..."></textarea>

</div>

<script>

var imagens = [
"midia/foto1.png",
"midia/foto2.png",
"midia/foto3.png",
"midia/foto4.png"
]

var videos = [
"midia/video1.mp4",
"midia/video2.mp4"
]

function criarImagem(){

var img = document.createElement("img")
img.src = imagens[Math.floor(Math.random()*imagens.length)]
img.className="media"

var x = Math.random()*window.innerWidth
var y = Math.random()*window.innerHeight

img.style.left=x+"px"
img.style.top=y+"px"

document.body.appendChild(img)

movimento(img)

}

function criarVideo(){

var vid = document.createElement("video")

vid.src = videos[Math.floor(Math.random()*videos.length)]
vid.autoplay=true
vid.loop=true
vid.muted=true
vid.className="media"

var x = Math.random()*window.innerWidth
var y = Math.random()*window.innerHeight

vid.style.left=x+"px"
vid.style.top=y+"px"

document.body.appendChild(vid)

movimento(vid)

}

function movimento(el){

var x=parseFloat(el.style.left)
var y=parseFloat(el.style.top)

var dx=(Math.random()*2)+1
var dy=(Math.random()*2)+1

setInterval(function(){

x+=dx
y+=dy

if(x>window.innerWidth-200||x<0) dx*=-1
if(y>window.innerHeight-200||y<0) dy*=-1

el.style.left=x+"px"
el.style.top=y+"px"

},30)

}


// criar várias mídias

for(let i=0;i<12;i++) criarImagem()

for(let i=0;i<4;i++) criarVideo()



// countdown

var volta = new Date("2026-06-23T09:00:00")

function atualizar(){

var agora = new Date()

var diff = volta-agora

var dias=Math.floor(diff/(1000*60*60*24))
var horas=Math.floor((diff/(1000*60*60))%24)
var min=Math.floor((diff/(1000*60))%60)
var seg=Math.floor((diff/1000)%60)

document.getElementById("countdown").innerHTML=
"⏳ Voltando ao trabalho em: "+dias+"d "+horas+"h "+min+"m "+seg+"s"

}

setInterval(atualizar,1000)



// música

var musicas = [
"musica/musica1.mp3",
"musica/musica2.mp3"
]

var audio = new Audio(
musicas[Math.floor(Math.random()*musicas.length)]
)

audio.loop=true
audio.volume=0.6

window.addEventListener("click",function(){

audio.play()

},{once:true})

</script>

</body>

</html>
